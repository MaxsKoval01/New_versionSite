<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ми працюємо з кольорами</title>
    <style>
        body {
            background-color: #0000FF;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .header-banner {
            background-color: #000000;
            color: #ffffff;
            padding: 15px 20px;
            font-size: 28px;
            margin-bottom: 25px;
        }

        .divider {
            border-bottom: 1px solid #ffffff;
            margin-bottom: 15px;
        }

        .color-bar {
            height: 35px;
            margin-bottom: 10px;
            border: 1px solid #ffffff;
        }

        .dark-red     { background-color: #8B0000; }
        .cyan         { background-color: #00FFFF; }
        .brown        { background-color: #8B4513; }
        .light-blue   { background-color: #00BFFF; }
        .purple       { background-color: #800080; }
        .lime         { background-color: #00FF00; }
        .magenta      { background-color: #FF00FF; }
        .orange       { background-color: #FF4500; }
        .yellow       { background-color: #FFFF00; }
        .pink         { background-color: #FFC0CB; }

        .gradient-bar {
            background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
        }
    </style>
</head>
<body>

    <div class="header-banner">
        ми працюємо з кольорами
    </div>

    <div class="divider"></div>

    <div class="color-bar dark-red"></div>
    <div class="color-bar cyan"></div>
    <div class="color-bar brown"></div>
    <div class="color-bar light-blue"></div>

    <div class="color-bar purple"></div>
    <div class="color-bar lime"></div>
    <div class="color-bar magenta"></div>
    <div class="color-bar orange"></div>
    <div class="color-bar yellow"></div>
    <div class="color-bar pink"></div>

    <div class="color-bar gradient-bar"></div>

</body>
</html>
