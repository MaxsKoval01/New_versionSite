<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ми вивчаємо роботу з зображеннями</title>
    <style>
        body {
            background-color: #90ee90;
            margin: 0;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
        }

        .header-banner {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1200');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            padding: 15px 20px;
            font-size: 38px;
            margin-bottom: 30px;
            border: 1px solid #000;
        }

        .image-container {
            width: 320px;
            height: 320px;
            border: 10px outset #ff69b4; 
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .bottom-block {
            width: 320px;
            height: 150px;
            background-color: #eee8aa;
            border: 20px solid #ff8c00;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        Ми вивчаємо роботу з зображеннями
    </div>

    <div class="image-container">
        <img src="https://www.bing.com/images/search?view=detailV2&ccid=GoS8dzXk&id=D286691E0C8503C4A138663B60AE587F613DCED9&thid=OIP.GoS8dzXkUVMr090ui83qOQHaGN&mediaurl=https%3a%2f%2fdostavka-cvetov-omsk.ru%2fwp-content%2fuploads%2f2018%2f03%2fbuket76.jpg&cdnurl=https%3a%2f%2fth.bing.com%2fth%2fid%2fR.1a84bc7735e451532bd3dd2e8bcdea39%3frik%3d2c49YX9YrmA7Zg%26pid%3dImgRaw%26r%3d0&exph=1159&expw=1381&q=%d0%b1%d1%83%d0%ba%d0%b5%d1%82+%d1%86%d0%b2%d0%b5%d1%82%d0%be%d0%b2&FORM=IRPRST&ck=F8503DA799BD31A120FB2BF6C60ACAC7&selectedIndex=3&itb=0" alt="Букет квітів">
    </div>

    <div class="bottom-block"></div>

</body>
</html>
