<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Красиві посилання</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
        }

        h1 {
            color: #ff9900;
            font-size: 36px;
            font-weight: normal;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-tag {
            display: inline-block;
            background-color: #ffff00; 
            color: #000000; 
            border: 3px solid #0000ff; 
            border-radius: 12px; 
            padding: 6px 16px;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }

        .btn-tag:hover {
            opacity: 0.9;
        }
        
        .btn-tag:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>ми робимо красиві посилання</h1>

    <div class="button-container">
        <a href="#" class="btn-tag">Ukraine</a>
        <a href="#" class="btn-tag">Poland</a>
        <a href="#" class="btn-tag">Germany</a>
        <a href="#" class="btn-tag">USA</a>
        <a href="#" class="btn-tag">Great Britain</a>
    </div>

</body>
</html>
